<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tarifas 2026 · Taxi Mallorca</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&display=swap');

  :root {
    --bg:       #0a0a0f;
    --surface:  #0f0f1a;
    --surface2: #14141f;
    --border:   #1e1e35;
    --accent:   #5b4eff;
    --accent-hi:#7c6fff;
    --text:     #e8e8f0;
    --muted:    #4a4a70;
    --danger:   #ff4e6a;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Mono', 'Courier New', monospace;
    min-height: 100vh;
    overflow-x: hidden;
  }

  header {
    padding: 18px 32px;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 14px;
    position: sticky; top: 0; z-index: 100;
    background: var(--bg);
  }

  .logo-mark {
    width: 32px; height: 32px;
    background: var(--accent);
    border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
    font-size: 12px; font-weight: 500; color: #fff;
    flex-shrink: 0; letter-spacing: 0.05em;
  }

  header h1 {
    font-size: 0.95rem; font-weight: 500; letter-spacing: 0.12em;
    text-transform: uppercase; color: var(--text);
  }
  header h1 span { color: var(--accent); }

  .header-right { margin-left: auto; display: flex; align-items: center; gap: 12px; }

  .status-dot {
    display: flex; align-items: center; gap: 7px;
    font-size: 0.68rem; color: var(--muted); letter-spacing: 0.06em;
  }
  .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--muted); flex-shrink: 0; }
  .dot.on      { background: var(--accent); box-shadow: 0 0 8px var(--accent); animation: pulse 2s ease-in-out infinite; }
  .dot.loading { background: var(--accent); animation: pulse 0.7s ease-in-out infinite; }
  .dot.err     { background: var(--danger); }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.25} }

  .main { max-width: 960px; margin: 0 auto; padding: 56px 24px 100px; }

  .hero { text-align: center; margin-bottom: 52px; }

  .hero-label {
    font-size: 0.68rem; color: var(--muted);
    letter-spacing: 0.18em; text-transform: uppercase;
    margin-bottom: 20px;
    display: flex; align-items: center; justify-content: center; gap: 12px;
  }
  .hero-label::before, .hero-label::after {
    content: ''; display: block; width: 28px; height: 1px;
    background: var(--border);
  }

  .hero h2 {
    font-size: clamp(2rem, 6vw, 3.6rem);
    font-weight: 500; line-height: 1.08;
    margin-bottom: 16px; letter-spacing: 0.06em;
    text-transform: uppercase;
  }
  .hero h2 em { font-style: normal; color: var(--accent); }

  .search-wrap { position: relative; max-width: 580px; margin: 32px auto 0; }

  .search-wrap input {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 16px 110px 16px 20px;
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 0.9rem; font-weight: 400;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
    letter-spacing: 0.04em;
  }
  .search-wrap input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(91,78,255,0.12);
  }
  .search-wrap input::placeholder { color: var(--muted); }
  .search-wrap input:disabled { opacity: 0.35; cursor: not-allowed; }

  .search-badge {
    position: absolute; right: 12px; top: 50%; transform: translateY(-50%);
    font-size: 0.62rem; color: var(--muted);
    background: var(--surface2); border: 1px solid var(--border);
    padding: 3px 8px; border-radius: 4px; white-space: nowrap;
    letter-spacing: 0.06em;
  }

  .suggestions {
    position: absolute; top: calc(100% + 6px); left: 0; right: 0;
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 8px; overflow: hidden; z-index: 200;
    display: none; box-shadow: 0 16px 40px rgba(0,0,0,0.6);
  }
  .suggestions.open { display: block; }
  .sug-item {
    padding: 11px 18px; cursor: pointer; font-size: 0.82rem;
    display: flex; justify-content: space-between; align-items: center;
    transition: background 0.1s;
    border-bottom: 1px solid rgba(30,30,53,0.8);
  }
  .sug-item:last-child { border-bottom: none; }
  .sug-item:hover { background: rgba(91,78,255,0.08); }
  .sug-name  { font-weight: 400; letter-spacing: 0.04em; }
  .sug-price { color: var(--accent); font-weight: 500; }

  .result-card {
    max-width: 580px; margin: 16px auto 52px;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 10px; padding: 26px 28px;
    display: none; animation: slideUp 0.2s ease;
  }
  .result-card.show { display: block; }
  @keyframes slideUp { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:translateY(0)} }

  .result-header {
    display: flex; justify-content: space-between; align-items: flex-start;
    margin-bottom: 14px;
  }
  .result-dest { font-size: 1.3rem; font-weight: 500; letter-spacing: 0.04em; }
  .result-tag {
    background: rgba(91,78,255,0.1); color: var(--accent);
    border: 1px solid rgba(91,78,255,0.25);
    border-radius: 4px; padding: 3px 9px;
    font-size: 0.62rem; letter-spacing: 0.1em; text-transform: uppercase;
  }
  .result-price {
    font-size: 2.8rem; font-weight: 400;
    color: var(--accent); margin-bottom: 20px; line-height: 1;
  }
  .result-actions { display: flex; gap: 8px; flex-wrap: wrap; }

  .btn {
    padding: 9px 18px; border-radius: 6px; border: none;
    font-family: 'DM Mono', monospace; font-size: 0.78rem; font-weight: 500;
    cursor: pointer; transition: all 0.15s;
    display: inline-flex; align-items: center; gap: 7px;
    letter-spacing: 0.06em; text-transform: uppercase;
  }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-primary:hover { background: var(--accent-hi); transform: translateY(-1px); }
  .btn-secondary { background: transparent; color: var(--muted); border: 1px solid var(--border); }
  .btn-secondary:hover { border-color: var(--accent); color: var(--accent); }

  .section-hd { display: flex; align-items: center; gap: 12px; margin-bottom: 18px; }
  .s-label { font-size: 0.65rem; color: var(--muted); letter-spacing: 0.14em; text-transform: uppercase; white-space: nowrap; }
  .s-line  { flex: 1; height: 1px; background: var(--border); }
  .s-count { font-size: 0.62rem; color: var(--muted); white-space: nowrap; letter-spacing: 0.06em; }

  .filter-wrap { margin-bottom: 14px; max-width: 280px; }
  .filter-wrap input {
    width: 100%; background: var(--surface); border: 1px solid var(--border);
    border-radius: 6px; padding: 8px 13px;
    font-family: 'DM Mono', monospace; font-size: 0.78rem; color: var(--text);
    outline: none; transition: border-color 0.15s; letter-spacing: 0.04em;
  }
  .filter-wrap input:focus { border-color: var(--accent); }
  .filter-wrap input::placeholder { color: var(--muted); }

  .price-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(210px, 1fr));
    gap: 1px; background: var(--border);
    border: 1px solid var(--border); border-radius: 8px; overflow: hidden;
  }
  .price-item {
    background: var(--surface); padding: 11px 15px;
    display: flex; align-items: center; justify-content: space-between;
    gap: 8px; cursor: pointer; transition: background 0.1s;
  }
  .price-item:hover  { background: var(--surface2); }
  .price-item.active { background: rgba(91,78,255,0.08); }
  .pi-name {
    font-size: 0.8rem; font-weight: 400; flex: 1; min-width: 0;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    letter-spacing: 0.03em;
  }
  .pi-price {
    font-size: 0.76rem; font-weight: 500;
    color: var(--accent); white-space: nowrap; flex-shrink: 0;
  }

  .state-box { text-align: center; padding: 64px 20px; }
  .spinner {
    width: 24px; height: 24px;
    border: 1.5px solid var(--border); border-top-color: var(--accent);
    border-radius: 50%; animation: spin 0.7s linear infinite; margin: 0 auto 14px;
  }
  @keyframes spin { to{transform:rotate(360deg)} }
  .state-box p { font-size: 0.75rem; color: var(--muted); letter-spacing: 0.06em; }

  .error-box {
    max-width: 520px; background: var(--surface);
    border: 1px solid var(--danger); border-radius: 8px; padding: 24px 28px;
  }
  .error-box h3 { font-size: 0.8rem; font-weight: 500; color: var(--danger); margin-bottom: 10px; text-transform: uppercase; letter-spacing: 0.1em; }
  .error-box p  { font-size: 0.75rem; color: var(--muted); line-height: 1.7; }
  .btn-retry {
    margin-top: 14px; padding: 8px 18px; background: var(--danger); color: #fff;
    border: none; border-radius: 6px; font-family: 'DM Mono', monospace;
    font-size: 0.75rem; font-weight: 500; cursor: pointer; transition: opacity 0.15s;
    text-transform: uppercase; letter-spacing: 0.06em;
  }
  .btn-retry:hover { opacity: 0.8; }

  .empty-item {
    grid-column: 1/-1; padding: 40px; text-align: center;
    font-size: 0.75rem; color: var(--muted); background: var(--surface);
    letter-spacing: 0.06em;
  }

  .toast-wrap {
    position: fixed; bottom: 20px; right: 20px;
    display: flex; flex-direction: column; gap: 6px; z-index: 600;
  }
  .toast {
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 6px; padding: 9px 14px;
    font-size: 0.72rem; max-width: 260px;
    animation: toastIn 0.2s ease; letter-spacing: 0.04em;
  }
  .toast.ok  { border-color: var(--accent); color: var(--accent); }
  .toast.err { border-color: var(--danger);  color: var(--danger);  }
  @keyframes toastIn { from{opacity:0;transform:translateX(10px)} to{opacity:1;transform:translateX(0)} }

  @media(max-width:600px) {
    header { padding: 14px 18px; }
    .main  { padding: 36px 16px 80px; }
    .hero h2 { font-size: 2rem; }
    .result-price { font-size: 2.2rem; }
  }
</style>
</head>
<body>

<header>
  <div class="logo-mark">tx</div>
  <h1>TARIFAS <span>·</span>2026</h1>
  <div class="header-right">
    <div class="status-dot">
      <span class="dot loading" id="dot"></span>
      <span id="statusTxt">conectando...</span>
    </div>
  </div>
</header>

<div class="main">

  <div class="hero">
    <h2>TARIFAS <em>2026</em></h2>

    <div class="search-wrap">
      <input type="text" id="searchInput" placeholder="escribe un destino..." disabled autocomplete="off">
      <span class="search-badge" id="searchBadge">cargando...</span>
      <div class="suggestions" id="suggestions"></div>
    </div>
  </div>

  <div class="result-card" id="resultCard">
    <div class="result-header">
      <div class="result-dest" id="rDest"></div>
      <span class="result-tag">tarifa</span>
    </div>
    <div class="result-price" id="rPrice"></div>
    <div class="result-actions">
      <button class="btn btn-primary" id="btnCopy">+ copiar precio</button>
      <button class="btn btn-secondary" onclick="closeResult()">cerrar</button>
    </div>
  </div>

  <div id="listArea">
    <div class="state-box">
      <div class="spinner"></div>
      <p>cargando tarifas...</p>
    </div>
  </div>

</div>

<div class="toast-wrap" id="toasts"></div>

<script>
const SHEET_ID = '1qkXngbJ0ncYeMVPwlo007mGp9cGHncfy';
const CSV_URL  = 'https://docs.google.com/spreadsheets/d/' + SHEET_ID + '/gviz/tq?tqx=out:csv&gid=804434384';
let allData = [];

async function loadData() {
  try {
    const res = await fetch(CSV_URL);
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const csv = await res.text();
    allData = parseCSV(csv);
    if (!allData.length) throw new Error('No se encontraron datos en el Sheet');
    setStatus('on', allData.length + ' destinos');
    const inp = document.getElementById('searchInput');
    inp.disabled = false;
    inp.placeholder = 'escribe un destino...';
    document.getElementById('searchBadge').textContent = allData.length + ' tarifas';
    renderList(allData);
    toast(allData.length + ' tarifas cargadas', 'ok');
  } catch(e) {
    setStatus('err', 'error');
    document.getElementById('searchBadge').textContent = 'error';
    document.getElementById('listArea').innerHTML =
      '<div class="error-box">' +
        '<h3>Error al cargar</h3>' +
        '<p>' + e.message + '<br><br>Verifica que el Google Sheet sea público (cualquier persona con el enlace puede ver).</p>' +
        '<button class="btn-retry" onclick="location.reload()">reintentar</button>' +
      '</div>';
  }
}

function parseCSV(csv) {
  var rows = csv.split('\n');
  var result = [], seen = {};
  for (var i = 0; i < rows.length; i++) {
    var row = rows[i];
    if (!row.trim()) continue;
    var cols = [], cur = '', inQ = false;
    for (var j = 0; j < row.length; j++) {
      if (row[j] === '"') { inQ = !inQ; continue; }
      if (row[j] === ',' && !inQ) { cols.push(cur.trim()); cur = ''; continue; }
      cur += row[j];
    }
    cols.push(cur.trim());
    var name     = (cols[1] || '').replace(/^"|"$/g, '').trim();
    var priceRaw = (cols[2] || '').replace(/^"|"$/g, '').trim();
    if (!name || !priceRaw) continue;
    if (/^(localidad|destino|precio|#)/i.test(name)) continue;
    if (name.length < 2) continue;
    var priceNum = parseFloat(priceRaw.replace(/[€\s]/g, '').replace(',', '.'));
    if (isNaN(priceNum) || priceNum <= 0 || priceNum > 500) continue;
    var key = name.toLowerCase();
    if (seen[key]) continue;
    seen[key] = true;
    result.push({ name: name, price: priceNum, priceStr: priceNum.toFixed(2).replace('.', ',') + ' €' });
  }
  return result.sort(function(a, b) { return a.name.localeCompare(b.name, 'es'); });
}

function renderList(data) {
  document.getElementById('listArea').innerHTML =
    '<div class="section-hd">' +
      '<span class="s-label">todos los destinos</span>' +
      '<div class="s-line"></div>' +
      '<span class="s-count">' + data.length + ' tarifas</span>' +
    '</div>' +
    '<div class="filter-wrap"><input type="text" placeholder="filtrar destino..." oninput="filterList(this.value)"></div>' +
    '<div class="price-grid" id="priceGrid">' + renderItems(data) + '</div>';
}

function renderItems(data) {
  if (!data.length) return '<div class="empty-item">sin resultados</div>';
  return data.map(function(r) {
    return '<div class="price-item" onclick="pick(\'' + esc(r.name) + '\',\'' + esc(r.priceStr) + '\')" data-name="' + esc(r.name) + '">' +
      '<span class="pi-name">' + r.name + '</span><span class="pi-price">' + r.priceStr + '</span></div>';
  }).join('');
}

function filterList(q) {
  var filtered = allData.filter(function(r) { return norm(r.name).indexOf(norm(q)) !== -1; });
  var grid = document.getElementById('priceGrid');
  if (grid) grid.innerHTML = renderItems(filtered);
}

var searchInput = document.getElementById('searchInput');
var suggestEl   = document.getElementById('suggestions');

searchInput.addEventListener('input', function() {
  var q = norm(searchInput.value);
  if (!q) { suggestEl.classList.remove('open'); return; }
  var matches = allData.filter(function(r) { return norm(r.name).indexOf(q) !== -1; }).slice(0, 8);
  if (!matches.length) { suggestEl.classList.remove('open'); return; }
  suggestEl.innerHTML = matches.map(function(r) {
    return '<div class="sug-item" onclick="pick(\'' + esc(r.name) + '\',\'' + esc(r.priceStr) + '\')">' +
      '<span class="sug-name">' + r.name + '</span><span class="sug-price">' + r.priceStr + '</span></div>';
  }).join('');
  suggestEl.classList.add('open');
});

searchInput.addEventListener('keydown', function(e) {
  if (e.key !== 'Enter') return;
  var q = norm(searchInput.value);
  var m = allData.find(function(r) { return norm(r.name).indexOf(q) !== -1; });
  if (m) pick(m.name, m.priceStr);
  suggestEl.classList.remove('open');
});

document.addEventListener('click', function(e) {
  if (!e.target.closest('.search-wrap')) suggestEl.classList.remove('open');
});

function pick(name, price) {
  searchInput.value = name;
  suggestEl.classList.remove('open');
  document.getElementById('rDest').textContent  = name;
  document.getElementById('rPrice').textContent = price;
  var card = document.getElementById('resultCard');
  card.classList.remove('show'); void card.offsetWidth; card.classList.add('show');
  document.getElementById('btnCopy').onclick = function() {
    navigator.clipboard.writeText(price).then(function() { toast('precio copiado', 'ok'); });
  };
  document.querySelectorAll('.price-item').forEach(function(el) {
    el.classList.toggle('active', el.dataset.name === name);
  });
}

function closeResult() {
  document.getElementById('resultCard').classList.remove('show');
  document.querySelectorAll('.price-item').forEach(function(e) { e.classList.remove('active'); });
  searchInput.value = '';
}

function setStatus(type, txt) {
  document.getElementById('dot').className = 'dot ' + type;
  document.getElementById('statusTxt').textContent = txt;
}

function toast(msg, type) {
  var el = document.createElement('div');
  el.className = 'toast ' + (type||'ok');
  el.textContent = msg;
  document.getElementById('toasts').appendChild(el);
  setTimeout(function() { el.remove(); }, 3000);
}

function norm(s) { return s.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, ''); }
function esc(s)  { return String(s).replace(/'/g, "&#39;").replace(/"/g, '&quot;'); }

loadData();
</script>
</body>
</html>
