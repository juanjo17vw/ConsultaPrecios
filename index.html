<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tarifas 2026 · Taxi Mallorca</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&display=swap');

  :root {
    --bg:       #0d0f14;
    --surface:  #161a24;
    --surface2: #1e2433;
    --border:   #2a3045;
    --accent:   #e8ff47;
    --accent2:  #47b8ff;
    --text:     #eef0f5;
    --muted:    #6b7694;
    --success:  #47ffaa;
    --danger:   #ff6b6b;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Syne', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 1000;
    opacity: 0.4;
  }

  header {
    padding: 20px 40px;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 14px;
    position: sticky; top: 0; z-index: 100;
    background: var(--bg);
  }

  .logo-mark {
    width: 34px; height: 34px;
    background: var(--accent);
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-family: 'DM Mono', monospace;
    font-size: 13px; font-weight: 500; color: #0d0f14;
    flex-shrink: 0;
  }

  header h1 { font-size: 1.05rem; font-weight: 700; letter-spacing: 0.04em; }

  .header-right { margin-left: auto; display: flex; align-items: center; gap: 12px; }

  .status-dot {
    display: flex; align-items: center; gap: 7px;
    font-family: 'DM Mono', monospace; font-size: 0.72rem; color: var(--muted);
  }
  .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--muted); flex-shrink: 0; }
  .dot.on      { background: var(--success); box-shadow: 0 0 8px var(--success); animation: pulse 2s ease-in-out infinite; }
  .dot.loading { background: var(--accent);  box-shadow: 0 0 8px var(--accent);  animation: pulse 0.7s ease-in-out infinite; }
  .dot.err     { background: var(--danger);  box-shadow: 0 0 8px var(--danger); }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }

  .main { max-width: 960px; margin: 0 auto; padding: 56px 24px 100px; }

  .hero { text-align: center; margin-bottom: 52px; }

  .hero-label {
    font-family: 'DM Mono', monospace;
    font-size: 0.72rem; color: var(--accent);
    letter-spacing: 0.16em; text-transform: uppercase;
    margin-bottom: 20px;
    display: flex; align-items: center; justify-content: center; gap: 10px;
  }
  .hero-label::before, .hero-label::after {
    content: ''; display: block; width: 32px; height: 1px;
    background: var(--accent); opacity: 0.5;
  }

  .hero h2 {
    font-size: clamp(2.4rem, 6vw, 4rem);
    font-weight: 800; line-height: 1.05;
    margin-bottom: 16px; letter-spacing: -0.01em;
  }
  .hero h2 em {
    font-style: normal;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  .search-wrap { position: relative; max-width: 600px; margin: 32px auto 0; }

  .search-wrap input {
    width: 100%;
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: 14px;
    padding: 18px 110px 18px 22px;
    color: var(--text);
    font-family: 'Syne', sans-serif;
    font-size: 1rem; font-weight: 600;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  .search-wrap input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(232,255,71,0.1);
  }
  .search-wrap input::placeholder { color: var(--muted); font-weight: 400; }
  .search-wrap input:disabled { opacity: 0.4; cursor: not-allowed; }

  .search-badge {
    position: absolute; right: 14px; top: 50%; transform: translateY(-50%);
    font-family: 'DM Mono', monospace; font-size: 0.68rem; color: var(--muted);
    background: var(--surface2); border: 1px solid var(--border);
    padding: 3px 8px; border-radius: 6px; white-space: nowrap;
  }

  .suggestions {
    position: absolute; top: calc(100% + 8px); left: 0; right: 0;
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 12px; overflow: hidden; z-index: 200;
    display: none; box-shadow: 0 16px 40px rgba(0,0,0,0.5);
  }
  .suggestions.open { display: block; }
  .sug-item {
    padding: 12px 20px; cursor: pointer; font-size: 0.9rem;
    display: flex; justify-content: space-between; align-items: center;
    transition: background 0.12s;
    border-bottom: 1px solid rgba(42,48,69,0.5);
  }
  .sug-item:last-child { border-bottom: none; }
  .sug-item:hover { background: var(--border); }
  .sug-name  { font-weight: 600; }
  .sug-price { font-family: 'DM Mono', monospace; color: var(--accent); font-weight: 500; }

  .result-card {
    max-width: 600px; margin: 20px auto 56px;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 18px; padding: 28px 32px;
    display: none; animation: slideUp 0.25s ease;
  }
  .result-card.show { display: block; }
  @keyframes slideUp { from{opacity:0;transform:translateY(14px)} to{opacity:1;transform:translateY(0)} }

  .result-header {
    display: flex; justify-content: space-between; align-items: flex-start;
    margin-bottom: 16px;
  }
  .result-dest { font-size: 1.6rem; font-weight: 800; letter-spacing: -0.01em; }
  .result-tag {
    background: rgba(232,255,71,0.1); color: var(--accent);
    border: 1px solid rgba(232,255,71,0.25);
    border-radius: 6px; padding: 4px 10px;
    font-family: 'DM Mono', monospace; font-size: 0.68rem;
    letter-spacing: 0.08em; text-transform: uppercase;
  }
  .result-price {
    font-size: 3rem; font-weight: 800;
    font-family: 'DM Mono', monospace;
    color: var(--accent); margin-bottom: 20px; line-height: 1;
  }
  .result-actions { display: flex; gap: 10px; flex-wrap: wrap; }

  .btn {
    padding: 10px 20px; border-radius: 10px; border: none;
    font-family: 'Syne', sans-serif; font-size: 0.85rem; font-weight: 700;
    cursor: pointer; transition: all 0.15s;
    display: inline-flex; align-items: center; gap: 8px;
  }
  .btn-primary { background: var(--accent); color: #0d0f14; }
  .btn-primary:hover { background: #fff; transform: translateY(-1px); }
  .btn-secondary { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
  .btn-secondary:hover { border-color: var(--accent); color: var(--accent); }

  .section-hd { display: flex; align-items: center; gap: 14px; margin-bottom: 20px; }
  .s-label { font-family: 'DM Mono', monospace; font-size: 0.7rem; color: var(--muted); letter-spacing: 0.12em; text-transform: uppercase; white-space: nowrap; }
  .s-line  { flex: 1; height: 1px; background: var(--border); }
  .s-count { font-family: 'DM Mono', monospace; font-size: 0.68rem; color: var(--muted); white-space: nowrap; }

  .filter-wrap { margin-bottom: 16px; max-width: 320px; }
  .filter-wrap input {
    width: 100%; background: var(--surface); border: 1px solid var(--border);
    border-radius: 10px; padding: 9px 14px;
    font-family: 'DM Mono', monospace; font-size: 0.82rem; color: var(--text);
    outline: none; transition: border-color 0.15s;
  }
  .filter-wrap input:focus { border-color: var(--accent); }
  .filter-wrap input::placeholder { color: var(--muted); }

  .price-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(210px, 1fr));
    gap: 1px; background: var(--border);
    border: 1px solid var(--border); border-radius: 14px; overflow: hidden;
  }
  .price-item {
    background: var(--surface); padding: 13px 16px;
    display: flex; align-items: center; justify-content: space-between;
    gap: 8px; cursor: pointer; transition: background 0.12s;
  }
  .price-item:hover  { background: var(--surface2); }
  .price-item.active { background: rgba(232,255,71,0.07); }
  .pi-name {
    font-size: 0.84rem; font-weight: 600; flex: 1; min-width: 0;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .pi-price {
    font-family: 'DM Mono', monospace; font-size: 0.8rem; font-weight: 500;
    color: var(--accent); white-space: nowrap; flex-shrink: 0;
  }

  .state-box { text-align: center; padding: 64px 20px; }
  .spinner {
    width: 28px; height: 28px;
    border: 2px solid var(--border); border-top-color: var(--accent2);
    border-radius: 50%; animation: spin 0.7s linear infinite; margin: 0 auto 16px;
  }
  @keyframes spin { to{transform:rotate(360deg)} }
  .state-box p { font-family: 'DM Mono', monospace; font-size: 0.8rem; color: var(--muted); }

  .error-box {
    max-width: 520px; background: var(--surface);
    border: 1px solid var(--danger); border-radius: 14px; padding: 28px 32px;
  }
  .error-box h3 { font-size: 0.9rem; font-weight: 700; color: var(--danger); margin-bottom: 10px; text-transform: uppercase; letter-spacing: 0.06em; }
  .error-box p  { font-family: 'DM Mono', monospace; font-size: 0.8rem; color: var(--muted); line-height: 1.65; }
  .btn-retry {
    margin-top: 16px; padding: 9px 20px; background: var(--danger); color: #fff;
    border: none; border-radius: 8px; font-family: 'Syne', sans-serif;
    font-size: 0.8rem; font-weight: 700; cursor: pointer; transition: opacity 0.15s;
  }
  .btn-retry:hover { opacity: 0.85; }

  .empty-item {
    grid-column: 1/-1; padding: 40px; text-align: center;
    font-family: 'DM Mono', monospace; font-size: 0.8rem; color: var(--muted);
    background: var(--surface);
  }

  .toast-wrap {
    position: fixed; bottom: 20px; right: 20px;
    display: flex; flex-direction: column; gap: 6px; z-index: 600;
  }
  .toast {
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 10px; padding: 10px 16px;
    font-family: 'DM Mono', monospace; font-size: 0.78rem;
    max-width: 280px; animation: toastIn 0.2s ease;
  }
  .toast.ok  { border-color: var(--success); color: var(--success); }
  .toast.err { border-color: var(--danger);  color: var(--danger);  }
  @keyframes toastIn { from{opacity:0;transform:translateX(10px)} to{opacity:1;transform:translateX(0)} }

  @media(max-width:600px) {
    header { padding: 16px 20px; }
    .main  { padding: 36px 16px 80px; }
    .hero h2 { font-size: 2.2rem; }
    .result-price { font-size: 2.2rem; }
  }
</style>
</head>
<body>

<header>
  <div class="logo-mark">tx</div>
  <h1>Tarifas Taxi Mallorca</h1>
  <div class="header-right">
    <div class="status-dot">
      <span class="dot loading" id="dot"></span>
      <span id="statusTxt">Conectando...</span>
    </div>
  </div>
</header>

<div class="main">

  <div class="hero">
    <div class="hero-label">Tarifa de agencia · Marzo 2026</div>
    <h2>TARIFAS <em>2026</em></h2>

    <div class="search-wrap">
      <input type="text" id="searchInput" placeholder="Escribe un destino..." disabled autocomplete="off">
      <span class="search-badge" id="searchBadge">cargando...</span>
      <div class="suggestions" id="suggestions"></div>
    </div>
  </div>

  <div class="result-card" id="resultCard">
    <div class="result-header">
      <div class="result-dest" id="rDest"></div>
      <span class="result-tag">tarifa</span>
    </div>
    <div class="result-price" id="rPrice"></div>
    <div class="result-actions">
      <button class="btn btn-primary" id="btnCopy">Copiar precio</button>
      <button class="btn btn-secondary" onclick="closeResult()">Cerrar</button>
    </div>
  </div>

  <div id="listArea">
    <div class="state-box">
      <div class="spinner"></div>
      <p>Cargando tarifas desde Google Sheets...</p>
    </div>
  </div>

</div>

<div class="toast-wrap" id="toasts"></div>

<script>
const SHEET_ID = '1qkXngbJ0ncYeMVPwlo007mGp9cGHncfy';
const CSV_URL  = 'https://docs.google.com/spreadsheets/d/' + SHEET_ID + '/gviz/tq?tqx=out:csv';
let allData = [];

async function loadData() {
  try {
    const res = await fetch(CSV_URL);
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const csv = await res.text();
    allData = parseCSV(csv);
    if (!allData.length) throw new Error('No se encontraron datos en el Sheet');

    setStatus('on', allData.length + ' destinos');
    const inp = document.getElementById('searchInput');
    inp.disabled = false;
    inp.placeholder = 'Escribe un destino...';
    document.getElementById('searchBadge').textContent = allData.length + ' tarifas';
    renderList(allData);
    toast(allData.length + ' tarifas cargadas', 'ok');
  } catch(e) {
    setStatus('err', 'Error');
    document.getElementById('searchBadge').textContent = 'error';
    document.getElementById('listArea').innerHTML =
      '<div class="error-box">' +
        '<h3>Error al cargar</h3>' +
        '<p>' + e.message + '<br><br>Verifica que el Google Sheet sea publico (cualquier persona con el enlace puede ver).</p>' +
        '<button class="btn-retry" onclick="location.reload()">Reintentar</button>' +
      '</div>';
  }
}

function parseCSV(csv) {
  var rows = csv.split('\n');
  var result = [], seen = {};
  for (var i = 0; i < rows.length; i++) {
    var row = rows[i];
    if (!row.trim()) continue;
    var cols = [], cur = '', inQ = false;
    for (var j = 0; j < row.length; j++) {
      if (row[j] === '"') { inQ = !inQ; continue; }
      if (row[j] === ',' && !inQ) { cols.push(cur.trim()); cur = ''; continue; }
      cur += row[j];
    }
    cols.push(cur.trim());

    var name     = (cols[1] || '').replace(/^"|"$/g, '').trim();
    var priceRaw = (cols[2] || '').replace(/^"|"$/g, '').trim();

    if (!name || !priceRaw) continue;
    if (/^(localidad|destino|precio|#)/i.test(name)) continue;
    if (name.length < 2) continue;

    var priceNum = parseFloat(priceRaw.replace(/[€\s]/g, '').replace(',', '.'));
    if (isNaN(priceNum) || priceNum <= 0 || priceNum > 500) continue;

    var key = name.toLowerCase();
    if (seen[key]) continue;
    seen[key] = true;

    result.push({
      name: name,
      price: priceNum,
      priceStr: priceNum.toFixed(2).replace('.', ',') + ' €'
    });
  }
  return result.sort(function(a, b) { return a.name.localeCompare(b.name, 'es'); });
}

function renderList(data) {
  var items = renderItems(data);
  document.getElementById('listArea').innerHTML =
    '<div class="section-hd">' +
      '<span class="s-label">Todos los destinos</span>' +
      '<div class="s-line"></div>' +
      '<span class="s-count">' + data.length + ' tarifas</span>' +
    '</div>' +
    '<div class="filter-wrap">' +
      '<input type="text" placeholder="Filtrar destino..." oninput="filterList(this.value)">' +
    '</div>' +
    '<div class="price-grid" id="priceGrid">' + items + '</div>';
}

function renderItems(data) {
  if (!data.length) return '<div class="empty-item">Sin resultados</div>';
  return data.map(function(r) {
    return '<div class="price-item" onclick="pick(\'' + esc(r.name) + '\',\'' + esc(r.priceStr) + '\')" data-name="' + esc(r.name) + '">' +
      '<span class="pi-name">' + r.name + '</span>' +
      '<span class="pi-price">' + r.priceStr + '</span>' +
    '</div>';
  }).join('');
}

function filterList(q) {
  var filtered = allData.filter(function(r) {
    return norm(r.name).indexOf(norm(q)) !== -1;
  });
  var grid = document.getElementById('priceGrid');
  if (grid) grid.innerHTML = renderItems(filtered);
}

var searchInput = document.getElementById('searchInput');
var suggestEl   = document.getElementById('suggestions');

searchInput.addEventListener('input', function() {
  var q = norm(searchInput.value);
  if (!q) { suggestEl.classList.remove('open'); return; }
  var matches = allData.filter(function(r) { return norm(r.name).indexOf(q) !== -1; }).slice(0, 8);
  if (!matches.length) { suggestEl.classList.remove('open'); return; }
  suggestEl.innerHTML = matches.map(function(r) {
    return '<div class="sug-item" onclick="pick(\'' + esc(r.name) + '\',\'' + esc(r.priceStr) + '\')">' +
      '<span class="sug-name">' + r.name + '</span>' +
      '<span class="sug-price">' + r.priceStr + '</span>' +
    '</div>';
  }).join('');
  suggestEl.classList.add('open');
});

searchInput.addEventListener('keydown', function(e) {
  if (e.key !== 'Enter') return;
  var q = norm(searchInput.value);
  var m = allData.find(function(r) { return norm(r.name).indexOf(q) !== -1; });
  if (m) pick(m.name, m.priceStr);
  suggestEl.classList.remove('open');
});

document.addEventListener('click', function(e) {
  if (!e.target.closest('.search-wrap')) suggestEl.classList.remove('open');
});

function pick(name, price) {
  searchInput.value = name;
  suggestEl.classList.remove('open');
  document.getElementById('rDest').textContent  = name;
  document.getElementById('rPrice').textContent = price;
  var card = document.getElementById('resultCard');
  card.classList.remove('show');
  void card.offsetWidth;
  card.classList.add('show');
  document.getElementById('btnCopy').onclick = function() {
    navigator.clipboard.writeText(price).then(function() { toast('Precio copiado', 'ok'); });
  };
  document.querySelectorAll('.price-item').forEach(function(el) {
    el.classList.toggle('active', el.dataset.name === name);
  });
}

function closeResult() {
  document.getElementById('resultCard').classList.remove('show');
  document.querySelectorAll('.price-item').forEach(function(e) { e.classList.remove('active'); });
  searchInput.value = '';
}

function setStatus(type, txt) {
  document.getElementById('dot').className = 'dot ' + type;
  document.getElementById('statusTxt').textContent = txt;
}

function toast(msg, type) {
  type = type || 'ok';
  var el = document.createElement('div');
  el.className = 'toast ' + type;
  el.textContent = msg;
  document.getElementById('toasts').appendChild(el);
  setTimeout(function() { el.remove(); }, 3000);
}

function norm(s) {
  return s.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '');
}

function esc(s) {
  return String(s).replace(/'/g, "&#39;").replace(/"/g, '&quot;');
}

loadData();
</script>
</body>
</html>
